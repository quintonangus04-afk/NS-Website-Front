<!DOCTYPE html>

    <head>
        <link rel="stylesheet" href="style.css">
        <title>Sign Up</title>
    </head>

    <body>
        <div id="container">
            <h1 class="primary-font">Sign Up</h1>
            <form>
                <input type="text" placeholder="Username" id="userNameInput" class="detailsInput">
                <h2 class="errorText" id="userNameError"></h2>
                <input type="email" placeholder="Email" id="emailInput" class="detailsInput">
                <h2 class="errorText" id="emailError"></h2>
                <input type="password" placeholder="Password" id="passwordInput" class="detailsInput">
                <h2 class="errorText" id="passwordError"></h2>
                <input type="password" placeholder="Confirm password" id="confirmPasswordInput" class="detailsInput">
                <h2 class="errorText" id="confirmPasswordError"></h2>
                <button type="button" id="submitBtn">Sign Up</button>
            </form>
        </div>
    </body>

    <script src="script.js"></script>

</html>
